<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Supermercado Online - Login/Criar Conta</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #f9f9f9;
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .container {
        background-color: #ffffff;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        width: 400px;
        padding: 20px;
      }

      .container h1 {
        text-align: center;
        color: #333;
      }

      .form-group {
        margin-bottom: 15px;
      }

      .form-group label {
        display: block;
        margin-bottom: 5px;
        color: #555;
      }

      .form-group input {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 16px;
      }

      .form-group button {
        width: 100%;
        padding: 10px;
        background-color: #28a745;
        color: #fff;
        border: none;
        border-radius: 4px;
        font-size: 16px;
        cursor: pointer;
      }

      .form-group button:hover {
        background-color: #218838;
      }

      .toggle-link {
        display: block;
        text-align: center;
        margin-top: 10px;
        color: #007bff;
        text-decoration: none;
        cursor: pointer;
      }

      .toggle-link:hover {
        text-decoration: underline;
      }
    </style>
    <script src="/static/scripts/script_index.js" defer></script>
  </head>

  <body>
    <div class="container" id="login-container">
      <h1>Login</h1>
      <form
        action="/doLogin"
        method="POST"
        onsubmit="return FormLoginValidator()"
        name="FormLogin"
      >
        <div class="form-group">
          <label for="email">Email:</label>
          <input
            type="email"
            id="emailID"
            name="email"
            pattern="{{ emailRegEx }}"
            placeholder="Digite seu email"
            required
          />
        </div>
        <div class="form-group">
          <label for="password">Senha:</label>
          <input
            type="password"
            id="passwordID"
            name="password"
            pattern="{{ passwordRegEx }}"
            placeholder="Digite sua senha"
            required
          />
        </div>
        <div class="form-group">
          <button type="submit">Entrar</button>
        </div>
      </form>
      <a class="toggle-link" onclick="toggleForm()">Não tem conta? Crie uma!</a>
    </div>

    <div class="container" id="signup-container" style="display: none">
      <h1>Criar Conta</h1>
      <form
        action="/doAccCreate"
        method="POST"
        onsubmit="return FormAccValidator()"
        name="FormAccCreate"
      >
        <div class="form-group">
          <label for="signup-email">Email:</label>
          <input
            type="email"
            id="signup-emailID"
            name="email"
            placeholder="Digite seu email"
            required
          />
        </div>
        <div class="form-group">
          <label for="signup-password">Senha:</label>
          <input
            type="password"
            id="signup-passwordID"
            name="password"
            placeholder="Crie uma senha"
            required
          />
        </div>
        <div class="form-group">
          <label for="signup-confirm-password">Confirmar Senha:</label>
          <input
            type="password"
            id="signup-confirm-passwordID"
            name="confirm-password"
            placeholder="Confirme sua senha"
            required
          />
        </div>
        <div class="form-group">
          <button type="submit">Criar Conta</button>
        </div>
      </form>
      <a class="toggle-link" onclick="toggleForm()"
        >Já tem uma conta? Faça login!</a
      >
    </div>
  </body>
</html>
