<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atualizar Informações</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            margin: 0;
            padding: 20px;
        }
        .form-container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            padding: 20px;
        }
        .form-container h1 {
            font-size: 24px;
            margin-bottom: 20px;
        }
        .form-container label {
            display: block;
            font-size: 16px;
            margin: 10px 0 5px;
        }
        .form-container input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            margin-bottom: 15px;
            font-size: 14px;
        }
        .form-container button {
            background-color: #28a745;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .form-container button:hover {
            background-color: #218838;
        }
        .back-btn-container {
            margin-top: 20px;
            text-align: center;
        }
        .back-btn {
            background-color: #007BFF;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
        }
        .back-btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h1>Atualizar Informações</h1>
        <form action="/account/update" method="POST" enctype="multipart/form-data">
            <label for="address">Morada</label>
            <input type="text" id="address" name="address" placeholder="Digite sua morada">

            <label for="age">Idade</label>
            <input type="number" id="age" name="age" placeholder="Digite sua idade">

            <label for="profile_picture">Foto de Perfil</label>
            <input type="file" id="profile_picture" name="profile_picture">

            <button type="submit">Salvar Informações</button>
        </form>
    </div>
    <div class="back-btn-container">
        <form action="/go-back" method="POST">
            <button class="back-btn">Voltar</button>
        </form>
    </div>
</body>
</html>
