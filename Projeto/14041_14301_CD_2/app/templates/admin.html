<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Painel de Administração</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            padding: 20px;
        }

        header {
            background-color: #343a40;
            color: white;
            padding: 15px 20px;
            font-size: 24px;
        }

        main {
            padding: 20px;
        }

        .section {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .section h2 {
            margin-top: 0;
        }
    </style>
</head>
<body>
    <header>Painel de Administração</header>
    <main>
        <div class="section">
            <h2>Bem-vindo(a), administrador!</h2>
            <p>Aqui poderás gerir utilizadores, produtos e visualizar estatísticas da plataforma.</p>
        </div>
        <div class="section">
            <h2>O que pretendes fazer?</h2>
            <ul>
                <li><a href="#">Ver utilizadores</a></li>
                <li><a href="#">Gerir produtos</a></li>
                <li><a href="#">Ver estatísticas</a></li>
            </ul>
            <p><em>(Estes links podem ser implementados mais tarde)</em></p>
        </div>
    </main>
</body>
</html>
